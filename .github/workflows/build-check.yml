name: Push & Pull Request Build Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fit
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root --password=root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.SUB_MODULE_TOKEN }}

      - name: Update Git Submodules
        run: git submodule update --init --recursive

      - name: Set environment variables
        run: |
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> $GITHUB_ENV
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> $GITHUB_ENV

      - name: Initialize MySQL User
        run: |
          docker exec $(docker ps -qf "ancestor=mysql:8.0") \
          mysql -u root -proot -e "CREATE USER IF NOT EXISTS '${{ secrets.MYSQL_USER }}'@'%' IDENTIFIED BY '${{ secrets.MYSQL_PASSWORD }}';"
          docker exec $(docker ps -qf "ancestor=mysql:8.0") \
          mysql -u root -proot -e "GRANT ALL PRIVILEGES ON fit.* TO '${{ secrets.MYSQL_USER }}'@'%';"
          docker exec $(docker ps -qf "ancestor=mysql:8.0") \
          mysql -u root -proot -e "FLUSH PRIVILEGES;"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle (Cache Disabled)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Start Kurento Media Server
        run: |
          docker run -d --name kurento-server -p 8888:8888 kurento/kurento-media-server
          sleep 10
          
      - name: Copy Private Configuration Files
        run: ./gradlew copyPrivate


      - name: Build & Run Tests
        run: ./gradlew clean build test
