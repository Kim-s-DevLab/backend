name: Push & Pull Request Build Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.SUB_MODULE_TOKEN }}

      - name: Update Git Submodules
        run: git submodule update --init --recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle (Cache Disabled)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Start Kurento Media Server
        run: |
          docker run -d --name kurento-server -p 8888:8888 kurento/kurento-media-server
          sleep 10

      - name: Build & Run Tests
        run: ./gradlew clean build test
