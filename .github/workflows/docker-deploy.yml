name: CD Pipeline

on:
  push:
    branches:
      - "feat-#22-ci-cd"
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build Spring Boot Application
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fit:latest

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2!"
            
            # Docker 그룹에 ubuntu 사용자 추가 (권한 문제 해결)
            sudo usermod -aG docker ubuntu
            newgrp docker  # 그룹 적용
            
            # Docker 설치 확인 및 설치
            if ! command -v docker &> /dev/null
            then
            echo "Docker not found. Installing Docker..."
            sudo apt update -y
            sudo apt install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
            else
            echo "Docker is already installed."
            fi
            
            # Nginx 설치 확인 및 설치
            if ! command -v nginx &> /dev/null
            then
            echo "Nginx not found. Installing Nginx..."
            sudo apt update -y
            sudo apt install -y nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx
            else
            echo "Nginx is already installed."
            fi
            docker ps
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fit:latest
            
            # 환경 변수 설정
            echo "Creating environment variables..."
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
            echo "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" >> .env
            echo "SPRING_REDIS_HOST=${{ secrets.SPRING_REDIS_HOST }}" >> .env
            
            
            if ! docker ps --format '{{.Names}}' | grep -q 'mysql'; then
              echo "Starting MySQL..."
              docker-compose up -d mysql
            fi

            if ! docker ps --format '{{.Names}}' | grep -q 'redis'; then
              echo "Starting Redis..."
              docker-compose up -d redis
            fi

            if ! docker ps --format '{{.Names}}' | grep -q 'kurento'; then
              echo "Starting Kurento..."
              docker-compose up -d kurento
            fi

            if ! docker ps --format '{{.Names}}' | grep -q 'nginx'; then
              echo "Starting Nginx..."
              docker-compose up -d nginx
            fi
            
            
            # 기존 컨테이너 종료 및 삭제
            echo "Stopping and removing the existing container..."
            if docker ps -a --format '{{.Names}}' | grep -q green; then
              echo "Stopping and removing the existing GREEN container..."
              docker stop green
              docker rm green
            else
              echo "No existing GREEN container found. Skipping removal."
            fi
            
            # 새로운 컨테이너 실행 (보안 환경 변수 적용)
            echo "Deploying new container as GREEN..."
            docker run -d --name green --env-file .env -p 8082:8080 ${{ secrets.DOCKERHUB_USERNAME }}/fit:latest
            
            # 첫 배포 시 `green`을 기본으로 설정
            if ! docker ps -a --format '{{.Names}}' | grep -q blue; then
              echo "First deployment detected. Using GREEN as default container."
              sudo sed -i 's/proxy_pass http:\/\/blue:8080;/proxy_pass http:\/\/green:8080;/' /etc/nginx/conf.d/app.conf
            else
              echo "Switching traffic to GREEN container..."
              sudo sed -i 's/proxy_pass http:\/\/blue:8080;/proxy_pass http:\/\/green:8080;/' /etc/nginx/conf.d/app.conf
            fi
            
            sudo systemctl reload nginx
            
            # 기존 컨테이너 정리 (1시간 후 삭제 -> 임시)
            echo "Scheduling old BLUE container for cleanup in 1 hour..."
            echo "docker stop blue && docker rm blue" | at now + 1 hour
            
            echo "Renaming GREEN container to BLUE..."
            docker rename green blue