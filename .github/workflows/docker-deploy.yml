name: CD Pipeline

on:
  push:
    branches:
      - "feat-#22-ci-cd"
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build Spring Boot Application
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fit:latest

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2!"
            
            # Docker 그룹에 ubuntu 사용자 추가 (권한 문제 해결)
            sudo usermod -aG docker ubuntu
            newgrp docker  # 그룹 적용
            
            # Docker 설치 확인 및 설치
            if ! command -v docker &> /dev/null
            then
            echo "Docker not found. Installing Docker..."
            sudo apt update -y
            sudo apt install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
            else
            echo "Docker is already installed."
            fi
            
            # Nginx 설치 확인 및 설치
            if ! command -v nginx &> /dev/null
            then
            echo "Nginx not found. Installing Nginx..."
            sudo apt update -y
            sudo apt install -y nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx
            else
            echo "Nginx is already installed."
            fi
            
            # 환경 변수 설정
            echo "Creating environment variables..."

            # 환경 변수 추가 함수
            add_env_var() {
            local key=$1
            local value=$2
            local file=".env"
            
            # 해당 키가 이미 존재하는지 확인
            if grep -q "^$key=" "$file"; then
            echo "$key already exists in .env, skipping..."
            else
            echo "$key=$value" >> "$file"
            echo "Added $key to .env"
            fi
            }
            
            # 환경 변수 설정
            add_env_var "MYSQL_ROOT_PASSWORD" "${{ secrets.MYSQL_ROOT_PASSWORD }}"
            add_env_var "MYSQL_DATABASE" "${{ secrets.MYSQL_DATABASE }}"
            add_env_var "MYSQL_USER" "${{ secrets.MYSQL_USER }}"
            add_env_var "MYSQL_PASSWORD" "${{ secrets.MYSQL_PASSWORD }}"
            add_env_var "REDIS_PASSWORD" "${{ secrets.REDIS_PASSWORD }}"
            add_env_var "SPRING_DATASOURCE_URL" "${{ secrets.SPRING_DATASOURCE_URL }}"
            add_env_var "SPRING_REDIS_HOST" "${{ secrets.SPRING_REDIS_HOST }}"
            add_env_var "DOCKERHUB_USERNAME" "${{ secrets.DOCKERHUB_USERNAME }}"
            
            # 기존 컨테이너 정리
            sudo docker rm -f $(sudo docker ps -aq) # 모든 컨테이너를 강제로 제거
            sudo docker network prune -f  # 사용되지 않는 네트워크 삭제
            
            docker ps
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fit:latest
            
            sudo docker-compose up -d
            sudo docker image prune -f
            
            # Nginx 재시작
            echo "Restarting Nginx..."
            sudo systemctl restart nginx
            
            echo "Deployment completed successfully!"